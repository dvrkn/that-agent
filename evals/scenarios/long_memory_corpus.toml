# ── Assert: all 26 entries injected ───────────────────────────────────────────
[[steps]]
type = "assert"
[[steps.assertions]]
kind    = "command_succeeds"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
COUNT=$(sqlite3 "$DB" "SELECT count(*) FROM memories WHERE tags LIKE '%eval-longmem%'")
echo "Injected: $COUNT entries (expected 26)"
[ "$COUNT" -eq 26 ]
"""

# ── Session A — incident timeline reconstruction ───────────────────────────────
# The query is phrased as a business review, not using incident IDs or technical
# terms from the stored entries. The agent must query broadly and stitch together
# three separate incident lifecycles from entries spread across 120, 55, and 20 days.
[[steps]]
type    = "prompt"
session = "A"
content = """
I am preparing a retrospective for the engineering leadership team and need a complete record of every production outage we have experienced. Walk me through each one — when it happened, what the impact was, what turned out to be the underlying cause, and how it was ultimately resolved. I want the full picture in chronological order.
"""

# Session A — compact the incident log into a canonical pinned entry
[[steps]]
type    = "prompt"
session = "A"
content = """
Good. Please consolidate everything you just recalled into a single authoritative incident log entry in your memory — one pinned note that captures all three incidents with their root causes, resolutions, and any operational lessons. This will be the canonical reference going forward.
"""

# Assert: a consolidated entry covering all three incidents was written
# Does not require source='compaction' — the agent may use mem_add or mem_compact;
# the rubric criterion scores which tool was used and whether it is pinned.
[[steps]]
type = "assert"
[[steps.assertions]]
kind    = "command_succeeds"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
sqlite3 "$DB" "
  SELECT count(*) FROM memories
  WHERE lower(content) LIKE '%inc-0312%'
    AND lower(content) LIKE '%inc-0891%'
    AND lower(content) LIKE '%inc-1204%'
    AND created_at > datetime('now', '-10 minutes')
" | grep -qE '^[1-9]'
"""

[[steps.assertions]]
kind      = "tool_call_seen"
tool      = "mem_recall"
min_count = 1

# ── Session boundary ────────────────────────────────────────────────────────────
[[steps]]
type    = "reset_session"
session = "A"

# ── Session B — exact current-state precision ──────────────────────────────────
# The agent must return the CURRENT pod and image hash (b3e8c1-qvp5z / d94f17e3),
# not the superseded pod from the resolved INC-0891 (9c1f3a-wrt4x / sha256:a3f7b2c1).
# Both exist in memory. Precision under recency is what is being tested.
[[steps]]
type    = "prompt"
session = "B"
content = """
I need the exact pod name and full image hash currently running for payments-api, along with the version. I am writing a rollback runbook and the identifiers must be accurate.
"""

[[steps]]
type = "assert"
[[steps.assertions]]
kind      = "tool_call_seen"
tool      = "mem_recall"
min_count = 2

# ── Session boundary ────────────────────────────────────────────────────────────
[[steps]]
type    = "reset_session"
session = "B"

# ── Session C — zero-shot preference recall ────────────────────────────────────
# Fresh session. No mention of incidents, pod names, or memory. A new deployment
# question is asked. The agent must recall min replicas, Recreate strategy, required
# labels, Priya ownership, and database migration approval — from memory alone.
[[steps]]
type    = "prompt"
session = "C"
content = """
I am about to deploy a new service into the payments namespace. Before I write the manifest, what are all the deployment constraints, SLA requirements, and team conventions I need to follow? I want to make sure I do not miss anything.
"""

[[steps]]
type = "assert"
[[steps.assertions]]
kind      = "tool_call_seen"
tool      = "mem_recall"
min_count = 3

# ── Session boundary ────────────────────────────────────────────────────────────
[[steps]]
type    = "reset_session"
session = "C"

# ── Session D — world-view synthesis ─────────────────────────────────────────────
# The agent is asked for practical safety knowledge for a new engineer.
# Good answers surface: k8s-worker-07 taint, staging divergence, CDN WAF rules,
# and the inference memory-leak watch item — entries scattered across 38, 42, 5,
# and 2 days ago. None of these are incident entries. They live in world-view and
# watch-item tags and would not surface from an incident-focused query.
[[steps]]
type    = "prompt"
session = "D"
content = """
A new engineer joins the team tomorrow. What are the three most important things about our cluster setup and current operational state that they need to know to avoid causing an incident in their first week? Keep it practical.
"""

[[steps]]
type = "assert"
[[steps.assertions]]
kind      = "tool_call_seen"
tool      = "mem_recall"
min_count = 4

# ── Session boundary ────────────────────────────────────────────────────────────
[[steps]]
type    = "reset_session"
session = "D"

# ── Session E — oldest-fact durability post-compaction ────────────────────────
# Session A compacted the incident log. This fresh session asks about the payments
# namespace founding — 90 days ago — which was NOT part of the incident compaction.
# The original entry (payments-api-7d4c2f-mnq8r / sha256:a3f7b2c1d8e945f0) still
# lives in the raw corpus and the compaction may reference payments context.
# This confirms oldest non-incident entries survive a long memory run.
[[steps]]
type    = "prompt"
session = "E"
content = """
Looking back at the early days of our payments service — when did it first go live, what was the initial deployment spec, and how does that original setup compare to where things stand now?
"""

[[steps]]
type = "assert"
[[steps.assertions]]
kind      = "tool_call_seen"
tool      = "mem_recall"
min_count = 5

# ── Session boundary ────────────────────────────────────────────────────────────
[[steps]]
type    = "reset_session"
session = "E"

# ── Cleanup ────────────────────────────────────────────────────────────────────
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
if [ -f "$DB" ]; then
  sqlite3 "$DB" "
    DELETE FROM memories
    WHERE tags LIKE '%eval-longmem%'
       OR (source='compaction' AND (
             lower(content) LIKE '%inc-0312%'
          OR lower(content) LIKE '%inc-0891%'
          OR lower(content) LIKE '%inc-1204%'
          OR lower(content) LIKE '%prod-us-east%'
          OR lower(content) LIKE '%payments-api%'
       ));
  " 2>/dev/null
fi
true
"""

# ── Rubric ─────────────────────────────────────────────────────────────────────
[rubric]

[[rubric.criteria]]
name        = "incident_chronology"
description = """
In session A, the agent retrieved and correctly described all three incidents in
chronological order: INC-0312 (api-gw OOM from unbounded middleware queue, ~120 days
ago), INC-0891 (payments-api connection pool exhaustion, ~55 days ago), and INC-1204
(inference pod OOM from model size exceeding node VRAM, ~20 days ago). Each incident
should include impact, root cause, and resolution. Low score if only the two recent
incidents appear or if root causes are confused across incidents. Zero if the agent
recalled only from the compaction entry it created — the first response must draw from
raw corpus entries.
"""
weight = 25

[[rubric.criteria]]
name        = "exact_id_precision"
description = """
In session B, the agent returned the CURRENT pod name (payments-api-b3e8c1-qvp5z) and
image hash (sha256:d94f17e36bc801f2 / v2.2.0). Full marks if correct. Significant
penalty if the superseded pod from INC-0891 (payments-api-9c1f3a-wrt4x, v2.1.3) is
returned instead — this is the core precision test. Partial credit if both are mentioned
but the current one is clearly identified as current.
"""
weight = 20

[[rubric.criteria]]
name        = "preference_recall"
description = """
In session C, a fresh session with no context asks about payments deployment constraints.
The agent should surface from memory: (1) minimum 3 replicas enforced by HPA and SLA,
(2) Recreate deployment strategy required, (3) mandatory labels app.owner / app.team /
app.sla-tier, (4) Priya is the owner and on-call contact for payments, (5) any database
migration requires Priya approval. High score: 4 or 5 of these retrieved unprompted.
Low score: agent answers from general knowledge rather than memory lookup, or retrieves
fewer than 2.
"""
weight = 20

[[rubric.criteria]]
name        = "world_view_synthesis"
description = """
In session D, the agent was asked for three safety-critical things for a new engineer.
Good answers draw from: (1) node k8s-worker-07 tainted NoSchedule — avoid scheduling
there, (2) staging is 2 weeks behind prod — do not use for benchmarks, (3) CDN WAF
rules CF-8821 and CF-9104 affect prod endpoints, (4) inference-worker has an active
memory-leak watch item that may become an incident. These are spread across world-view
and watch-item tagged entries from 2 to 42 days ago. High score: 3 or more of these
surfaced as practical advice. Low score: agent surfaces only recent incident entries
and misses the latent world-view context.
"""
weight = 15

[[rubric.criteria]]
name        = "oldest_fact_survival"
description = """
In session E (post-compaction, fresh session), the agent correctly recalled the payments
namespace founding context: first deployment ~90 days ago, initial pod
payments-api-7d4c2f-mnq8r, image sha256:a3f7b2c1d8e945f0, 3 replicas, Recreate
strategy, PostgreSQL sidecar. The agent should also contrast this with the current state
(v2.2.0, pod payments-api-b3e8c1-qvp5z) to demonstrate it can hold both founding and
current facts simultaneously. Low score if agent cannot recall the original pod name or
image hash, indicating oldest entries were not indexed or were displaced by recency.
"""
weight = 10

[[rubric.criteria]]
name        = "compaction_quality"
description = """
The compaction entry created in session A should be a coherent, actionable incident log —
not a raw dump of entries. It should capture all three incidents, distinguish root causes
clearly, and note the resolved status of each. A reader should be able to understand the
full incident history from this single entry alone. Low score if the entry is a
verbatim copy-paste of stored content rather than a synthesized narrative.
"""
weight = 5

[[rubric.criteria]]
name        = "no_hallucination"
description = """
Every specific technical claim across all five sessions — pod names, image hashes,
version numbers, incident IDs, VRAM capacities, node names, WAF rule IDs, connection
pool sizes — must be traceable to one of the 26 injected entries. The agent must not
invent plausible-sounding pod names, version numbers, or incident details. One
uninvented specific technical identifier counts as a hallucination.
"""
weight = 5
