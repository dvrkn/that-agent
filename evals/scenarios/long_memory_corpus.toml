name        = "Long-Memory Corpus — Six Months of Production Cluster Survival"
description = """
Stress-tests recall across a realistic large corpus: 26 memory entries injected at
staggered timestamps spanning 180 days, simulating what a long-running cluster agent
accumulates over half a year of production operations.

The corpus covers three full production incidents with lifecycle entries (opened /
root-cause / resolved), pod names and image SHAs that change across incidents (so the
agent must distinguish current state from superseded state), implicit deployment
preferences, team ownership, world-view gotchas, and open watch items.

Five independent sessions each probe a distinct recall dimension:

  Session A — incident timeline reconstruction.
              Query phrasing deliberately differs from stored phrasing to stress the
              FTS5 BM25 index across 120-, 55-, and 20-day-old entries.
              Ends with compaction of the full incident log.

  Session B — exact current-state precision.
              The agent must surface today's pod name and image hash, not the
              superseded pod from a resolved incident three sessions ago.

  Session C — zero-shot preference recall.
              Fresh session, no context. A deployment question is asked with no hints.
              The agent must pull constraints from memory alone: min replicas,
              deployment strategy, required labels, ownership rules.

  Session D — world-view synthesis.
              "Three things a new engineer must know to avoid an incident."
              Tests that safety-critical world-view entries (tainted node, staging
              divergence, CDN WAF rules, open memory-leak watch item) surface as
              practical advice rather than being buried by recency.

  Session E — oldest-fact durability post-compaction.
              After session A compacted the incident log, a fresh session asks about
              the very first deployment (180 days ago). Confirms the compaction entry
              preserved enough founding-era context to answer questions without the
              original entries.
"""
agent_name   = "default"
provider     = "openai"
model        = "gpt-5.2-codex"
max_turns    = 30
sandbox      = false
tags         = ["memory", "long-lived", "temporal", "corpus", "incidents", "preferences", "precision"]
timeout_secs = 300

# ── Pre-cleanup ────────────────────────────────────────────────────────────────
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
if [ -f "$DB" ]; then
  sqlite3 "$DB" "
    DELETE FROM memories
    WHERE tags LIKE '%eval-longmem%'
       OR (source='compaction' AND (
             lower(content) LIKE '%inc-0312%'
          OR lower(content) LIKE '%inc-0891%'
          OR lower(content) LIKE '%inc-1204%'
          OR lower(content) LIKE '%prod-us-east%'
          OR lower(content) LIKE '%payments-api%'
       ));
  " 2>/dev/null
fi
true
"""

# ── Inject phase 1 — cluster bootstrap and initial deployments (T-180 to T-150) ─
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
sqlite3 "$DB" "
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))),
   'prod-us-east cluster bootstrapped. k8s v1.28.0. 6 worker nodes: 4x n2-standard-8, 2x g2-standard-4 GPU. Initial namespaces: api-gw, payments, monitoring.',
   'eval-longmem,cluster,setup', 'eval',
   datetime('now', '-180 days'), datetime('now', '-180 days'));

INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))),
   'api-gw first deployment: image registry.internal/api-gw:v1.0.0, 3 replicas, RollingUpdate strategy, maxSurge 1 maxUnavailable 0. Ingress via nginx-ingress-controller.',
   'eval-longmem,api-gw,deployment', 'eval',
   datetime('now', '-165 days'), datetime('now', '-165 days'));

INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))),
   'Deployment strategy preference: api-gw uses RollingUpdate. payments must use Recreate — state-sensitive, partial rollout would corrupt in-flight transaction ledger entries.',
   'eval-longmem,preference,deployment,payments,api-gw', 'eval',
   datetime('now', '-150 days'), datetime('now', '-150 days'));
" 2>/dev/null
true
"""

