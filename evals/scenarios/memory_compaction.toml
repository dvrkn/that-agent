name        = "Memory Compaction Under Accumulated Load"
description = """
Simulates a long-running agent that has built up many individual memory entries over
several weeks (injected at staggered timestamps to mimic real chronology). The agent is
asked to review and tidy its notes. A high-scoring run calls mem_compact to synthesize
the fragmented entries into a durable pinned summary, demonstrating proactive memory
hygiene rather than just a textual recap.
"""
agent_name   = "default"
provider     = "openai"
model        = "gpt-5.2-codex"
max_turns    = 25
sandbox      = false
tags         = ["memory", "compaction", "long-lived", "autonomy"]
timeout_secs = 210

# ── Pre-cleanup ────────────────────────────────────────────────────────────────
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
if [ -f "$DB" ]; then
  sqlite3 "$DB" "DELETE FROM memories WHERE tags LIKE '%eval-compact%' OR (source='compaction' AND lower(content) LIKE '%aurora-svc%')" 2>/dev/null
fi
true
"""

# ── Inject: accumulated fragmented memories at staggered dates ─────────────────
# Each row simulates a note the agent would have jotted during daily work over 8 weeks.
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
sqlite3 "$DB" "
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc API v1 endpoints flagged for deprecation. Plan to remove after Q3 migration window closes.', 'eval-compact,aurora-svc,api', 'eval', datetime('now', '-56 days'), datetime('now', '-56 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc v2 auth: JWT bearer tokens, 1-hour expiry, refresh via /auth/refresh endpoint.', 'eval-compact,aurora-svc,auth', 'eval', datetime('now', '-49 days'), datetime('now', '-49 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc rate limit: 500 req per minute per tenant; burst allowance 1000 req for 10 seconds.', 'eval-compact,aurora-svc,rate-limit', 'eval', datetime('now', '-42 days'), datetime('now', '-42 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc k8s: 3 replicas baseline, autoscales to 10 when CPU exceeds 70 percent.', 'eval-compact,aurora-svc,infra', 'eval', datetime('now', '-35 days'), datetime('now', '-35 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc database: Postgres 15, primary in us-east-1, read replica in eu-west-1. Failover tested.', 'eval-compact,aurora-svc,database', 'eval', datetime('now', '-28 days'), datetime('now', '-28 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'Team convention: squash-merge only, PR titles must follow conventional commits format.', 'eval-compact,aurora-svc,team', 'eval', datetime('now', '-21 days'), datetime('now', '-21 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc has a goroutine leak in the websocket handler when clients disconnect abruptly. Tracked as GH-4821.', 'eval-compact,aurora-svc,bugs', 'eval', datetime('now', '-18 days'), datetime('now', '-18 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc CI: GitHub Actions, 3 stages: lint and test, build and push image, deploy to k8s. Full pipeline takes 8 minutes.', 'eval-compact,aurora-svc,ci', 'eval', datetime('now', '-14 days'), datetime('now', '-14 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'Monitoring: Datadog dashboards, alerts on p99 latency over 300ms or error rate over 1 percent.', 'eval-compact,aurora-svc,monitoring', 'eval', datetime('now', '-10 days'), datetime('now', '-10 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'GH-4821 root cause confirmed: goroutine not exiting because context cancellation was ignored. Fix in PR-4890.', 'eval-compact,aurora-svc,bugs', 'eval', datetime('now', '-7 days'), datetime('now', '-7 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'aurora-svc v1 deprecation deadline extended by 4 weeks due to customer migration delays.', 'eval-compact,aurora-svc,api', 'eval', datetime('now', '-4 days'), datetime('now', '-4 days'));
INSERT INTO memories (id, content, tags, source, created_at, updated_at) VALUES
  (lower(hex(randomblob(16))), 'GH-4821 fix merged and deployed. Goroutine count stable in production for 72 hours. Bug closed.', 'eval-compact,aurora-svc,bugs', 'eval', datetime('now', '-2 days'), datetime('now', '-2 days'))
" 2>/dev/null
true
"""

# ── Assert: injection succeeded ────────────────────────────────────────────────
[[steps]]
type = "assert"
[[steps.assertions]]
kind    = "command_succeeds"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
sqlite3 "$DB" "SELECT count(*) FROM memories WHERE tags LIKE '%eval-compact%'" | grep -qE '^(1[012]|[2-9][0-9])$'
"""

# ── Session A: ask the agent to do memory housekeeping ────────────────────────
[[steps]]
type    = "prompt"
session = "A"
content = """
We have been working on aurora-svc for a while and I imagine there is quite a bit of accumulated context in your memory. Can you do a memory review? Look at what you have built up, note anything that is outdated or has been superseded, and leave things in a clean, consolidated state that will be easy to reference in future sessions.
"""

# ── Assert: a pinned compaction entry was written to the DB ────────────────────
[[steps]]
type = "assert"
[[steps.assertions]]
kind    = "command_succeeds"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
sqlite3 "$DB" "SELECT count(*) FROM memories WHERE source='compaction' AND lower(content) LIKE '%aurora%' AND created_at > datetime('now', '-10 minutes')" | grep -qE '^[1-9]'
"""

# ── Cleanup ────────────────────────────────────────────────────────────────────
[[steps]]
type    = "run_command"
command = """
DB="$HOME/.that-agent/agents/{{agent_name}}/memory.db"
if [ -f "$DB" ]; then
  sqlite3 "$DB" "DELETE FROM memories WHERE tags LIKE '%eval-compact%' OR (source='compaction' AND lower(content) LIKE '%aurora-svc%')" 2>/dev/null
fi
true
"""

# ── Rubric ─────────────────────────────────────────────────────────────────────
[rubric]

[[rubric.criteria]]
name        = "memory_retrieved"
description = """
Agent used mem_recall or mem_search to look up its stored notes before forming a
response — it did not summarize from imagination alone.
"""
weight = 20

[[rubric.criteria]]
name        = "compaction_executed"
description = """
Agent called mem_compact (not just listed facts in its text reply) to create a durable
pinned summary entry. High score: explicit mem_compact call with a coherent summary.
Low score: agent described what it would do but made no tool call.
"""
weight = 40

[[rubric.criteria]]
name        = "stale_awareness"
description = """
Agent correctly identified superseded entries: GH-4821 is resolved (the open bug entry
is stale), the v1 deprecation deadline has shifted. The compaction reflects current
truth rather than blindly listing all entries.
"""
weight = 25

[[rubric.criteria]]
name        = "synthesis_quality"
description = """
The compaction summary is coherent and actionable — it reads like a useful handoff
note rather than a raw data dump. Key facts (auth model, infra, CI, monitoring) are
present and integrated.
"""
weight = 15
