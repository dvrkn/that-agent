name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [OPERATORS.md](../OPERATORS.md) troubleshooting section and existing issues.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `that ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version (`rustc --version`), sandbox mode, run mode (run / chat / listen / eval).
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      render: text
