name: Feature request
description: Propose an improvement to the framework foundation
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, consider whether this capability could be built as an agent plugin rather than a framework change. See [CONTRIBUTING.md](../CONTRIBUTING.md) for guidance on the distinction.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap in the current foundation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change and why is this the right layer to change it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated, including building it as a plugin.
