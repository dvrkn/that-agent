apiVersion: v1
kind: Service
metadata:
  name: that-agent
spec:
  selector:
    app.kubernetes.io/name: that-agent
    app.kubernetes.io/component: runtime
  ports:
    - name: gateway
      port: 8080
      targetPort: 8080
    - name: git-http
      port: 9418
      targetPort: 9418
    - name: cache-proxy
      port: 3128
      targetPort: 3128
