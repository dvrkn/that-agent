apiVersion: apps/v1
kind: Deployment
metadata:
  name: that-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: that-agent
      app.kubernetes.io/component: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: that-agent
        app.kubernetes.io/component: runtime
    spec:
      serviceAccountName: that-agent
      automountServiceAccountToken: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: that-agent
          image: ghcr.io/that-labs/that-agent:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/bash", "/opt/that/bootstrap/entrypoint.sh"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: THAT_K8S_SERVICE_ACCOUNT
              value: that-agent
            - name: BUILDKIT_HOST
              value: unix:///run/buildkit/buildkitd.sock
            - name: THAT_AGENT_PARENT
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_AGENT_PARENT
                  optional: true
            - name: THAT_AGENT_ROLE
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_AGENT_ROLE
                  optional: true
          envFrom:
            - configMapRef:
                name: that-agent-config
            - secretRef:
                name: that-agent-secrets
          volumeMounts:
            - name: agent-home
              mountPath: /home/agent/.that-agent
            - name: workspace
              mountPath: /workspace
            - name: buildkit-socket
              mountPath: /run/buildkit
            - name: buildkit-bin
              mountPath: /opt/buildkit/bin
              readOnly: true
            - name: entrypoint-script
              mountPath: /opt/that/bootstrap
              readOnly: true
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "test -f /tmp/that-agent-ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /tmp/that-agent-alive && \
                  [ $(( $(date +%s) - $(stat -c %Y /tmp/that-agent-alive) )) -lt 30 ]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        - name: buildkit-daemon
          image: moby/buildkit:v0.25.1-rootless
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: true
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              REGISTRY="${THAT_SANDBOX_K8S_REGISTRY:-}"
              PUSH_REGISTRY="${THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT:-${REGISTRY}}"
              BUILDKIT_GC_KEEPSTORAGE_MB="${BUILDKIT_GC_KEEPSTORAGE_MB:-4096}"
              BUILDKITD_CFG="/home/user/.config/buildkit/buildkitd.toml"
              mkdir -p "$(dirname "${BUILDKITD_CFG}")"
              mkdir -p /opt/buildkit/bin
              if [ -x /usr/bin/buildctl ]; then
                cp -f /usr/bin/buildctl /opt/buildkit/bin/buildctl
                chmod 0755 /opt/buildkit/bin/buildctl
              fi
              if command -v rootlesskit >/dev/null 2>&1; then
                BUILDKIT_LAUNCHER="rootlesskit buildkitd"
              else
                BUILDKIT_LAUNCHER="buildkitd"
              fi
              if [ -n "${REGISTRY}" ] || [ -n "${PUSH_REGISTRY}" ]; then
                : > "${BUILDKITD_CFG}"
                if [ -n "${REGISTRY}" ]; then
                  printf '[registry."%s"]\n  http = true\n  insecure = true\n' "${REGISTRY}" >> "${BUILDKITD_CFG}"
                fi
                if [ -n "${PUSH_REGISTRY}" ] && [ "${PUSH_REGISTRY}" != "${REGISTRY}" ]; then
                  printf '[registry."%s"]\n  http = true\n  insecure = true\n' "${PUSH_REGISTRY}" >> "${BUILDKITD_CFG}"
                fi
                exec ${BUILDKIT_LAUNCHER} \
                  --config "${BUILDKITD_CFG}" \
                  --addr unix:///run/buildkit/buildkitd.sock \
                  --oci-worker-gc \
                  --oci-worker-gc-keepstorage "${BUILDKIT_GC_KEEPSTORAGE_MB}" \
                  --oci-worker-no-process-sandbox
              fi
              exec ${BUILDKIT_LAUNCHER} \
                --addr unix:///run/buildkit/buildkitd.sock \
                --oci-worker-gc \
                --oci-worker-gc-keepstorage "${BUILDKIT_GC_KEEPSTORAGE_MB}" \
                --oci-worker-no-process-sandbox
          env:
            - name: THAT_SANDBOX_K8S_REGISTRY
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_SANDBOX_K8S_REGISTRY
            - name: THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_SANDBOX_K8S_REGISTRY_PUSH_ENDPOINT
            - name: OTEL_SDK_DISABLED
              value: "true"
            - name: BUILDKIT_GC_KEEPSTORAGE_MB
              valueFrom:
                configMapKeyRef:
                  name: that-agent-config
                  key: THAT_BUILDKIT_GC_KEEPSTORAGE_MB
                  optional: true
          readinessProbe:
            exec:
              command: ["/bin/sh", "-lc", "buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers >/dev/null 2>&1"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-lc", "buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers >/dev/null 2>&1"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: buildkit-socket
              mountPath: /run/buildkit
            - name: buildkit-bin
              mountPath: /opt/buildkit/bin
            - name: buildkit-state
              mountPath: /home/user/.local/share/buildkit
        - name: git-server
          image: ghcr.io/that-labs/that-agent:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              REPO_DIR=/repos/workspace.git
              mkdir -p "${REPO_DIR}"
              cd "${REPO_DIR}"
              git init --bare --quiet
              git config http.receivepack true
              export GIT_PROJECT_ROOT=/repos
              export GIT_HTTP_EXPORT_ALL=1
              exec python3 -c "
              import http.server, subprocess, os, sys
              os.chdir('/repos')
              class GitHTTPHandler(http.server.CGIHTTPRequestHandler):
                  cgi_directories = ['/']
                  have_fork = False
                  def translate_path(self, path):
                      return '/usr/lib/git-core/git-http-backend'
              http.server.HTTPServer(('0.0.0.0', 9418), GitHTTPHandler).serve_forever()
              "
          ports:
            - containerPort: 9418
              name: git-http
          volumeMounts:
            - name: git-repos
              mountPath: /repos
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
        - name: cache-proxy
          image: ghcr.io/that-labs/that-agent:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              mkdir -p /var/cache/proxy
              if command -v squid >/dev/null 2>&1; then
                cat > /tmp/squid.conf <<'CONF'
              http_port 3128
              cache_dir ufs /var/cache/proxy 4096 16 256
              maximum_object_size 512 MB
              cache_mem 256 MB
              access_log none
              http_access allow all
              CONF
                exec squid -N -f /tmp/squid.conf
              else
                echo "squid not available, running minimal TCP proxy passthrough"
                exec python3 -c "
              import socketserver, socket, threading, sys
              class ProxyHandler(socketserver.StreamRequestHandler):
                  def handle(self):
                      line = self.rfile.readline(65537)
                      if b'CONNECT' in line:
                          host_port = line.split()[1].decode()
                          host, port = host_port.rsplit(':', 1)
                          try:
                              remote = socket.create_connection((host, int(port)), timeout=10)
                              self.wfile.write(b'HTTP/1.1 200 Connection Established\r\n\r\n')
                              self.wfile.flush()
                              def forward(src, dst):
                                  try:
                                      while True:
                                          data = src.recv(65536)
                                          if not data: break
                                          dst.sendall(data)
                                  except: pass
                              t = threading.Thread(target=forward, args=(remote, self.request))
                              t.daemon = True
                              t.start()
                              forward(self.request, remote)
                              remote.close()
                          except Exception as e:
                              self.wfile.write(f'HTTP/1.1 502 Bad Gateway\r\n\r\n{e}'.encode())
              server = socketserver.ThreadingTCPServer(('0.0.0.0', 3128), ProxyHandler)
              server.serve_forever()
              "
              fi
          ports:
            - containerPort: 3128
              name: cache-proxy
          volumeMounts:
            - name: proxy-cache
              mountPath: /var/cache/proxy
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
      volumes:
        - name: agent-home
          persistentVolumeClaim:
            claimName: that-agent-home
        - name: workspace
          emptyDir: {}
        - name: buildkit-socket
          emptyDir: {}
        - name: buildkit-bin
          emptyDir: {}
        - name: buildkit-state
          emptyDir:
            sizeLimit: 8Gi
        - name: entrypoint-script
          configMap:
            name: that-agent-entrypoint
            defaultMode: 493
        - name: git-repos
          emptyDir:
            sizeLimit: 4Gi
        - name: proxy-cache
          emptyDir:
            sizeLimit: 8Gi
