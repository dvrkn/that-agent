apiVersion: apps/v1
kind: Deployment
metadata:
  name: that-agent
spec:
  template:
    spec:
      containers:
        - name: that-agent
          env:
            - name: DOCKER_HOST
              value: unix:///docker-socket/docker.sock
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: THAT_DOCKER_DAEMON_SOURCE
              value: dind_sidecar
          volumeMounts:
            - name: docker-socket
              mountPath: /docker-socket
        - name: docker-daemon
          image: docker:27-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              REGISTRY="${THAT_SANDBOX_K8S_REGISTRY:-}"
              DOCKER_GROUP="${THAT_DOCKER_DAEMON_GROUP:-1000}"
              if [ -n "${REGISTRY}" ]; then
                exec dockerd \
                  --host=unix:///docker-socket/docker.sock \
                  --group="${DOCKER_GROUP}" \
                  --data-root=/var/lib/docker \
                  --insecure-registry="${REGISTRY}"
              fi
              exec dockerd \
                --host=unix:///docker-socket/docker.sock \
                --group="${DOCKER_GROUP}" \
                --data-root=/var/lib/docker
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
            - name: DOCKER_HOST
              value: unix:///docker-socket/docker.sock
          envFrom:
            - configMapRef:
                name: that-agent-config
          readinessProbe:
            exec:
              command: ["/bin/sh", "-lc", "docker info >/dev/null 2>&1"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["/bin/sh", "-lc", "docker info >/dev/null 2>&1"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: docker-socket
              mountPath: /docker-socket
            - name: docker-data
              mountPath: /var/lib/docker
      volumes:
        - name: docker-socket
          emptyDir: {}
        - name: docker-data
          emptyDir: {}
